spring:
  application:
    name: transaction-management-microservice

  datasource:
    url: jdbc:postgresql://localhost:5432/transactiondb
    username: postgres
    password: siraj123
    driver-class-name: org.postgresql.Driver

    # HikariCP connection pooling configuration
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# Prometheus metrics monitoring via Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

  endpoint:
    prometheus:
      enabled: true

  metrics:
    enable:
      jdbc: true
      hikaricp: true

server:
  port: 8080